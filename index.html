<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing</title>
  <style>
    :root {
      --primary: #d88c9a;
      --secondary: #f7ede2;
      --text: #1f1f1f;
      --muted: #6b6b6b;
      --card-border: #ece7e2;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(180deg, var(--secondary) 0%, #ffffff 100%);
      padding: 64px 20px 40px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
    }

    .intro {
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.4;
      margin: 0 0 14px;
      max-width: 760px;
    }

    .description {
      font-size: 16px;
      line-height: 1.65;
      color: var(--muted);
      margin: 0;
      max-width: 760px;
    }

    .section {
      padding: 24px 20px 60px;
    }

    .section-title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 6;
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 22px 22px 20px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.07);
      border-color: var(--primary);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .arrow {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--secondary);
      display: grid;
      place-items: center;
    }

    .card-slug {
      font-size: 13px;
      color: var(--muted);
      word-break: break-word;
    }

    .loading,
    .error,
    .empty {
      padding: 28px 0;
      color: var(--muted);
    }

    @media (max-width: 800px) {
      .hero {
        padding: 40px 16px 28px;
      }

      .section {
        padding: 12px 16px 40px;
      }

      .card {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <div id="welcome" class="eyebrow">Welcome</div>
      <h1 id="siteTitle">Documents</h1>
      <p id="intro" class="intro">Explore the available documents below.</p>
      <p id="description" class="description">A simple responsive landing page powered by Google Sheets.</p>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <p class="section-title">Documents</p>
      <div id="status" class="loading">Loading…</div>
      <div id="grid" class="grid" style="display:none;"></div>
    </div>
  </main>

  <script>
    const SITE_CSV_URL = "SITE_CSV_URL";
    const DOCS_CSV_URL = "DOCS_CSV_URL";

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = splitCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).filter(Boolean).map(line => {
        const values = splitCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (values[i] || "").trim());
        return obj;
      });
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function setTheme(siteRow) {
      const root = document.documentElement;
      if (siteRow.primary_color) root.style.setProperty('--primary', siteRow.primary_color);
      if (siteRow.secondary_color) root.style.setProperty('--secondary', siteRow.secondary_color);

      document.getElementById('siteTitle').textContent = siteRow.site_title || 'Documents';
      document.getElementById('welcome').textContent = siteRow.welcome_text || 'Welcome';
      document.getElementById('intro').textContent = siteRow.intro_text || 'Explore the available documents below.';
      document.getElementById('description').textContent = siteRow.description_text || '';
      document.title = siteRow.site_title || 'Documents';
    }

    async function loadLanding() {
      const status = document.getElementById('status');
      const grid = document.getElementById('grid');

      try {
        const [siteRes, docsRes] = await Promise.all([
          fetch(SITE_CSV_URL),
          fetch(DOCS_CSV_URL)
        ]);

        if (!siteRes.ok) throw new Error(`Site config fetch failed: ${siteRes.status}`);
        if (!docsRes.ok) throw new Error(`Docs fetch failed: ${docsRes.status}`);

        const siteRows = parseCSV(await siteRes.text());
        const docsRows = parseCSV(await docsRes.text());

        const siteRow = siteRows[0] || {};
        setTheme(siteRow);

        const map = new Map();
        docsRows.forEach(row => {
          if (!row.slug) return;
          if (!map.has(row.slug)) {
            map.set(row.slug, {
              slug: row.slug,
              title: row.title || row.slug,
              menu_order: Number(row.menu_order || 999)
            });
          }
        });

        const docs = Array.from(map.values()).sort((a, b) => a.menu_order - b.menu_order);

        if (!docs.length) {
          status.className = 'empty';
          status.textContent = 'No documents available.';
          return;
        }

        grid.innerHTML = '';
        docs.forEach(doc => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = `/${doc.slug}`;
          a.innerHTML = `
            <div class="card-top">
              <h2 class="card-title">${doc.title}</h2>
              <div class="arrow" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
              </div>
            </div>
            <div class="card-slug">/${doc.slug}</div>
          `;
          grid.appendChild(a);
        });

        status.style.display = 'none';
        grid.style.display = 'grid';
      } catch (err) {
        status.className = 'error';
        status.textContent = err.message || 'Error';
      }
    }

    loadLanding();
  </script>
</body>
</html>
