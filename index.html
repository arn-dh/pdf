<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga with Gabi</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="pageLoader" class="page-loader"><div class="spinner"></div></div>

  <header class="hero" style="display:none;">
    <div class="wrap">
      <div id="welcome" class="eyebrow"></div>
      <h1 id="siteTitle"></h1>
      <p id="intro" class="intro"></p>
      <p id="description" class="description"></p>
    </div>
  </header>

  <main class="section" style="display:none;">
    <div class="wrap">
      <div id="status" class="loading"></div>
      <div id="grid" class="grid" style="display:none;"></div>
    </div>
  </main>

  <section id="contact" class="contact wrap" style="display:none;">
    <img id="profileImg" class="contact-img" alt="Profile photo" />

    <div class="contact-content">
      <h2 id="contactTitle"></h2>
      <p id="contactText"></p>

      <div class="contact-actions">
        <a id="whatsappBtn" target="_blank" rel="noopener noreferrer" class="btn whatsapp">
          <span>WhatsApp</span>
        </a>

        <a id="instagramBtn" target="_blank" rel="noopener noreferrer" class="btn instagram">
          <span>Instagram</span>
        </a>
      </div>
    </div>
  </section>

  <script src="./js/config.js"></script>
  <script src="./js/sheet.js"></script>
  <script src="./js/landing.js"></script>
</body>
</html>
