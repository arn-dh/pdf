<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga Para Gestantes</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: sans-serif;
    }

    .viewer {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page {
      width: 100%;
      display: block;
    }

    /* Floating navigation */
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      z-index: 1000;
    }

    .nav button {
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav svg {
      width: 20px;
      height: 20px;
      stroke: #222;
    }

    .counter {
      font-size: 12px;
      color: #666;
      min-width: 40px;
      text-align: center;
    }

    .loading, .error {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    @media (max-width: 768px) {
      .viewer {
        max-width: 100%;
      }

      .nav {
        bottom: 10px;
        padding: 6px 10px;
      }
    }
  </style>
</head>

<body>

  <div id="status" class="loading">●</div>

  <div id="viewer" class="viewer" style="display:none;"></div>

  <div class="nav">
    <button onclick="prevPage()">
      <svg viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6" fill="none" stroke-width="2"/>
      </svg>
    </button>

    <div id="counter" class="counter">1 / 1</div>

    <button onclick="nextPage()">
      <svg viewBox="0 0 24 24">
        <path d="M9 6l6 6-6 6" fill="none" stroke-width="2"/>
      </svg>
    </button>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBRNywCUXtuErdWe-NruEud3OcOLucMof3oO8taZU5n9sETW-gKJMi3sv9w0GmRwiVf7S4Gy23Znuv/pub";

    const isMobile = window.innerWidth <= 768;
    const device = isMobile ? "mobile" : "desktop";

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug") || "yoga-doc";

    const viewer = document.getElementById("viewer");
    const status = document.getElementById("status");
    const counter = document.getElementById("counter");

    let pages = [];
    let elements = [];
    let current = 0;

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      const headers = lines[0].split(",");

      return lines.slice(1).map(line => {
        const values = line.split(",");
        let obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (values[i] || "").trim());
        return obj;
      });
    }

    function updateCounter(i) {
      counter.textContent = `${i+1} / ${elements.length}`;
    }

    function scrollToPage(i) {
      if (i < 0 || i >= elements.length) return;
      current = i;
      elements[i].scrollIntoView({ behavior: "smooth" });
      updateCounter(i);
    }

    function nextPage() {
      if (current < elements.length - 1) scrollToPage(current + 1);
    }

    function prevPage() {
      if (current > 0) scrollToPage(current - 1);
    }

    async function load() {
      try {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        const data = parseCSV(text);

        pages = data
          .filter(r => r.slug === slug && r.device === device)
          .sort((a,b) => Number(a.order) - Number(b.order));

        if (!pages.length) throw "No content";

        viewer.innerHTML = "";
        elements = [];

        pages.forEach((p, i) => {
          const img = document.createElement("img");
          img.src = p.image_url;
          img.className = "page";
          img.loading = "lazy";
          viewer.appendChild(img);
          elements.push(img);
        });

        status.style.display = "none";
        viewer.style.display = "block";

        updateCounter(0);

        const observer = new IntersectionObserver(entries => {
          const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a,b) => b.intersectionRatio - a.intersectionRatio)[0];

          if (visible) {
            current = elements.indexOf(visible.target);
            updateCounter(current);
          }
        }, { threshold: 0.6 });

        elements.forEach(el => observer.observe(el));

      } catch(e) {
        status.className = "error";
        status.textContent = "Error";
      }
    }

    load();
  </script>

</body>
</html>
